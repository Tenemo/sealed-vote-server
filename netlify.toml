[build]
  base = "."
  command = "pnpm turbo run build --filter=@sealed-vote/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "24.14.1"
  PNPM_VERSION = "10.33.0"
  VITE_API_BASE_URL = "https://api.sealed.vote"

[context.deploy-preview.environment]
  VITE_API_BASE_URL = "https://api.sealed.vote"

[functions]
  included_files = ["netlify/functions/assets/fonts/**"]

[[edge_functions]]
  function = "poll-seo"
  path = "/polls/*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://api.sealed.vote; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; manifest-src 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:;"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Legacy passthrough for explicit /api requests. The production browser now
# talks directly to VITE_API_BASE_URL so poll traffic avoids Netlify edge
# security challenges on the /api path.
[[redirects]]
  from = "/api/*"
  to = "https://api.sealed.vote/api/:splat"
  status = 200

[[redirects]]
  from = "/social/votes/*"
  to = "/social/polls/:splat"
  status = 301

[[redirects]]
  from = "/votes/*"
  to = "/polls/:splat"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
