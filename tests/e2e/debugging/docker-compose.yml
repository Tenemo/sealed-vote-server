name: e2e-debugging

services:
  playwright-debug:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    ipc: host
    stdin_open: true
    tty: true
    environment:
      CI: 'true'
      HOME: /root
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-https://sealed.vote}
      PLAYWRIGHT_BLOB_REPORT: 'true'
      PLAYWRIGHT_CI_WORKERS: ${PLAYWRIGHT_CI_WORKERS:-1}
      PLAYWRIGHT_NAVIGATION_RETRY_TIMEOUTS: ${PLAYWRIGHT_NAVIGATION_RETRY_TIMEOUTS:-true}
      PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: ${PLAYWRIGHT_NAVIGATION_TIMEOUT_MS:-45000}
      PLAYWRIGHT_PRODUCTION_ISOLATE_BY_FILE: ${PLAYWRIGHT_PRODUCTION_ISOLATE_BY_FILE:-true}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      npm_config_store_dir: /pnpm-store
    volumes:
      - ../../../:/src:ro
      - ../../../test-results/debugging-container:/artifacts
      - playwright-debug-work:/work
      - playwright-debug-pnpm-store:/pnpm-store
    entrypoint:
      - /bin/bash
      - /src/tests/e2e/debugging/prepare-container.sh

volumes:
  playwright-debug-pnpm-store:
  playwright-debug-work:
