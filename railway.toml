[build]
builder = "RAILPACK"
buildCommand = "pnpm turbo run build --filter=@sealed-vote/server"

[deploy]
startCommand = "pnpm --filter @sealed-vote/server start"
preDeployCommand = "pnpm --filter @sealed-vote/server db:migrate"
healthcheckPath = "/api/health-check"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
