name: readme badges

on:
    push:
        branches: [master, main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish-badge-data:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: reset database schema
              run: pnpm db:reset

            - name: generate badge data
              run: pnpm coverage:ci

            - name: upload coverage summaries
              uses: actions/upload-artifact@v4
              with:
                  name: badge-data
                  path: |
                      apps/api/coverage/coverage-summary.json
                      apps/web/coverage/coverage-summary.json
                      packages/protocol/coverage/coverage-summary.json
                      .github/badge-data
                  if-no-files-found: error

            - name: publish badge data branch
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  rm -rf badge-data-publish
                  mkdir -p badge-data-publish
                  cp -r .github/badge-data/. badge-data-publish/
                  cd badge-data-publish
                  git init
                  git checkout -b badge-data
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add --all
                  git commit -m "Update README badge data"
                  git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git push --force origin badge-data
