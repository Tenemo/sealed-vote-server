name: ci

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]
    merge_group:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run lint
              run: pnpm lint

    typecheck:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run typecheck
              run: pnpm typecheck

    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: reset database schema
              run: pnpm db:reset

            - name: run tests
              run: pnpm test

    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run build
              run: pnpm build

    e2e-required:
        name: e2e-required
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'merge_group' ||
            (github.event_name == 'push' && github.ref_name == 'master') ||
            (github.event_name == 'pull_request' && github.base_ref == 'master')
        timeout-minutes: 45

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: install Playwright browsers
              run: pnpm e2e:install

            - name: run browser e2e
              run: pnpm e2e

            - name: upload Playwright artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-artifacts
                  path: |
                      playwright-report
                      test-results
                  if-no-files-found: ignore
