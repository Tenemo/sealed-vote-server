name: ci

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]
    merge_group:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run lint
              run: pnpm lint

    typecheck:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run typecheck
              run: pnpm typecheck

    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d sv-db"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: reset database schema
              run: pnpm db:reset

            - name: run tests
              run: pnpm test

    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run build
              run: pnpm build

    e2e-prepare:
        name: e2e-prepare
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'merge_group' ||
            (github.event_name == 'push' && contains(fromJson('["master","main"]'), github.ref_name)) ||
            (github.event_name == 'pull_request' && contains(fromJson('["master","main"]'), github.base_ref))
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: build e2e artifacts
              env:
                  VITE_API_BASE_URL: http://127.0.0.1:4000
              run: pnpm e2e:ci:build

            - name: upload e2e build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: e2e-build-artifacts
                  path: |
                      apps/api/dist
                      apps/web/dist
                      packages/contracts/dist
                      packages/protocol/dist
                  if-no-files-found: error

    e2e-matrix:
        name: e2e (${{ matrix.project.name }})
        needs: e2e-prepare
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
            options: --ipc=host
        if: >-
            github.event_name == 'merge_group' ||
            (github.event_name == 'push' && contains(fromJson('["master","main"]'), github.ref_name)) ||
            (github.event_name == 'pull_request' && contains(fromJson('["master","main"]'), github.base_ref))
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                project:
                    - name: chromium-desktop
                      slug: chromium-desktop
                      ci_workers: '2'
                    - name: firefox-desktop
                      slug: firefox-desktop
                      ci_workers: '2'
                    - name: mobile-firefox-android
                      slug: mobile-firefox-android
                      ci_workers: '2'
                    - name: webkit-desktop
                      slug: webkit-desktop
                      ci_workers: '2'

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d sv-db"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@postgres:5432/sv-db
            HOME: /root
            NODE_ENV: test
            PLAYWRIGHT_BLOB_REPORT: 'true'
            PLAYWRIGHT_CI_WORKERS: ${{ matrix.project.ci_workers }}

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: restore e2e build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: e2e-build-artifacts
                  path: .

            - name: run browser e2e
              run: pnpm e2e:ci:test -- --project ${{ matrix.project.name }}

            - name: upload Playwright blob report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-blob-report-${{ matrix.project.slug }}
                  path: blob-report
                  if-no-files-found: ignore

            - name: upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-test-results-${{ matrix.project.slug }}
                  path: test-results
                  if-no-files-found: ignore

    e2e-report:
        name: e2e-report
        if: >-
            always() &&
            (
                github.event_name == 'merge_group' ||
                (github.event_name == 'push' && contains(fromJson('["master","main"]'), github.ref_name)) ||
                (github.event_name == 'pull_request' && contains(fromJson('["master","main"]'), github.base_ref))
            )
        needs: e2e-matrix
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: skip merged report on green matrix
              if: needs.e2e-matrix.result == 'success'
              run: echo "Skipping merged Playwright report because all matrix jobs passed."

            - uses: actions/checkout@v6
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              run: pnpm install --frozen-lockfile

            - name: download Playwright blob reports
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              uses: actions/download-artifact@v8
              with:
                  pattern: playwright-blob-report-*
                  merge-multiple: true
                  path: all-blob-reports

            - name: merge Playwright report
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

            - name: upload merged Playwright report
              if: needs.e2e-matrix.result == 'failure' || needs.e2e-matrix.result == 'cancelled'
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report
                  path: playwright-report
                  if-no-files-found: ignore

    e2e-required:
        name: e2e
        if: >-
            always() &&
            (
                github.event_name == 'merge_group' ||
                (github.event_name == 'push' && contains(fromJson('["master","main"]'), github.ref_name)) ||
                (github.event_name == 'pull_request' && contains(fromJson('["master","main"]'), github.base_ref))
            )
        needs: [e2e-prepare, e2e-matrix, e2e-report]
        runs-on: ubuntu-latest

        steps:
            - name: assert e2e jobs passed
              run: |
                  if [ "${{ needs.e2e-prepare.result }}" != "success" ]; then
                    echo "e2e-prepare result: ${{ needs.e2e-prepare.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.e2e-matrix.result }}" != "success" ]; then
                    echo "e2e-matrix result: ${{ needs.e2e-matrix.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.e2e-report.result }}" != "success" ]; then
                    echo "e2e-report result: ${{ needs.e2e-report.result }}"
                    exit 1
                  fi
