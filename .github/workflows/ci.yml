name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    quality:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16.2
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Reset database schema
              run: pnpm db:reset

            - name: Lint affected workspaces
              run: pnpm turbo run lint --affected

            - name: Typecheck affected workspaces
              run: pnpm turbo run typecheck --affected

            - name: Stylelint web workspace
              run: pnpm --filter @sealed-vote/web stylelint

            - name: Test affected workspaces
              run: pnpm turbo run test --affected

            - name: Build affected workspaces
              run: pnpm turbo run build --affected

    e2e:
        needs: quality
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16.2
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sv-db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/sv-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Reset database schema
              run: pnpm db:reset

            - name: Install Playwright browsers
              run: pnpm e2e:install

            - name: Run browser E2E
              run: pnpm e2e
