name: production e2e

on:
    push:
        branches: [master, main]
    workflow_dispatch:
        inputs:
            skip_deploy_validation:
                description: Skip waiting for the selected commit to reach production and run the checked-out suite against the currently live site.
                required: false
                type: boolean
                default: false

permissions:
    contents: read

concurrency:
    group: production-e2e-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate-manual-production-mode:
        name: validate manual production mode
        runs-on: ubuntu-latest
        outputs:
            should_run_matrix: ${{ steps.resolve-run-mode.outputs.should_run_matrix }}
            should_wait_for_deploy: ${{ steps.resolve-run-mode.outputs.should_wait_for_deploy }}
            skip_reason: ${{ steps.resolve-run-mode.outputs.skip_reason }}

        steps:
            - id: resolve-run-mode
              name: resolve production run mode
              shell: bash
              run: |
                  set -euo pipefail

                  event_name="${{ github.event_name }}"
                  skip_deploy_validation="${{ github.event.inputs.skip_deploy_validation }}"
                  selected_ref_name="${{ github.ref_name }}"
                  should_run_matrix="false"
                  should_wait_for_deploy="false"
                  skip_reason=""

                  if [ "$event_name" != "workflow_dispatch" ]; then
                    should_run_matrix="true"
                    should_wait_for_deploy="true"
                  elif [ "$skip_deploy_validation" = "true" ]; then
                    should_run_matrix="true"
                  elif [ "$selected_ref_name" = "main" ] || [ "$selected_ref_name" = "master" ]; then
                    should_run_matrix="true"
                    should_wait_for_deploy="true"
                  else
                    skip_reason="Manual production e2e runs from non-production branches default to a no-op because the selected ref ${selected_ref_name} is not deployed to https://sealed.vote. Re-run with skip_deploy_validation=true to execute the checked-out suite against the currently live production site."
                  fi

                  {
                    echo "should_run_matrix=${should_run_matrix}"
                    echo "should_wait_for_deploy=${should_wait_for_deploy}"
                    echo "skip_reason<<__PRODUCTION_E2E_SKIP_REASON__"
                    echo "${skip_reason}"
                    echo "__PRODUCTION_E2E_SKIP_REASON__"
                  } >> "$GITHUB_OUTPUT"

                  if [ -n "$skip_reason" ]; then
                    echo "$skip_reason"
                  elif [ "$should_wait_for_deploy" = "true" ]; then
                    echo "Waiting for the selected commit to reach https://sealed.vote before running production e2e."
                  else
                    echo "Running the checked-out suite against the currently live production site without deploy validation."
                  fi

    wait-for-production-deploy:
        name: wait for production deploy
        needs: [validate-manual-production-mode]
        if: >-
            ${{
                always() &&
                needs.validate-manual-production-mode.result == 'success' &&
                needs.validate-manual-production-mode.outputs.should_wait_for_deploy == 'true'
            }}
        runs-on: ubuntu-latest
        timeout-minutes: 40

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'

            - name: wait for stable production readiness
              run: >-
                  node --experimental-strip-types tests/e2e/scripts/wait-for-production-deploy.mts
                  --commit ${{ github.sha }}
                  --web https://sealed.vote
                  --api https://api.sealed.vote
                  --timeout-ms 1800000
                  --interval-ms 15000
                  --request-timeout-ms 10000
                  --required-stable-checks 2

    production-e2e-matrix:
        name: production e2e (${{ matrix.project.name }})
        needs: [validate-manual-production-mode, wait-for-production-deploy]
        if: >-
            ${{
                always() &&
                needs.validate-manual-production-mode.result == 'success' &&
                needs.validate-manual-production-mode.outputs.should_run_matrix == 'true' &&
                (
                    needs.validate-manual-production-mode.outputs.should_wait_for_deploy != 'true' ||
                    needs.wait-for-production-deploy.result == 'success'
                )
            }}
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
            options: --ipc=host
        timeout-minutes: 30
        strategy:
            fail-fast: false
            # Keep one Playwright worker per browser job for determinism, but
            # cap the live browser matrix at two concurrent jobs to reduce
            # burst pressure against the public frontend and API origins.
            max-parallel: 2
            matrix:
                project:
                    - name: chromium-desktop
                      slug: chromium-desktop
                      ci_workers: '1'
                    - name: firefox-desktop
                      slug: firefox-desktop
                      ci_workers: '1'
                    - name: webkit-desktop
                      slug: webkit-desktop
                      ci_workers: '1'
                    - name: mobile-firefox-android
                      slug: mobile-firefox-android
                      ci_workers: '1'

        env:
            HOME: /root
            PLAYWRIGHT_BASE_URL: https://sealed.vote
            PLAYWRIGHT_BLOB_REPORT: 'true'
            PLAYWRIGHT_CI_WORKERS: ${{ matrix.project.ci_workers }}
            PLAYWRIGHT_PRODUCTION_ISOLATE_BY_FILE: 'true'
            PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: '45000'

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: wait for browser production readiness
              run: >-
                  node --experimental-strip-types tests/e2e/scripts/wait-for-production-browser-readiness.mts
                  --timeout-ms 1200000
                  --interval-ms 15000
                  --required-stable-checks 2
                  --
                  --project ${{ matrix.project.name }}

            - name: run production browser e2e
              # Intentional: production coverage stays full-suite against the
              # live site instead of falling back to smoke-only checks.
              run: pnpm e2e:production:test -- --project ${{ matrix.project.name }}

            - name: capture same-container endpoint diagnostics
              if: failure()
              run: >-
                  pnpm e2e:production:diagnostics --
                  --output-dir production-diagnostics
                  --web-base-url https://sealed.vote
                  --api-base-url https://api.sealed.vote
                  --repeat 3
                  --interval-ms 5000
                  --request-timeout-ms 15000

            - name: upload production diagnostics
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: production-endpoint-diagnostics-${{ matrix.project.slug }}
                  path: production-diagnostics
                  if-no-files-found: ignore

            - name: upload Playwright blob report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: production-playwright-blob-report-${{ matrix.project.slug }}
                  path: blob-report
                  if-no-files-found: ignore

            - name: upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: production-playwright-test-results-${{ matrix.project.slug }}
                  path: test-results
                  if-no-files-found: ignore

    production-e2e:
        name: production e2e
        if: always()
        needs:
            [
                validate-manual-production-mode,
                wait-for-production-deploy,
                production-e2e-matrix,
            ]
        runs-on: ubuntu-latest

        steps:
            - name: assert production e2e jobs passed
              run: |
                  if [ "${{ needs.validate-manual-production-mode.result }}" != "success" ]; then
                    echo "validate-manual-production-mode result: ${{ needs.validate-manual-production-mode.result }}"
                    exit 1
                  fi

                  if [ -n "${{ needs.validate-manual-production-mode.outputs.skip_reason }}" ]; then
                    echo "${{ needs.validate-manual-production-mode.outputs.skip_reason }}"
                    exit 0
                  fi

                  if [ "${{ needs.validate-manual-production-mode.outputs.should_wait_for_deploy }}" = "true" ] && [ "${{ needs.wait-for-production-deploy.result }}" != "success" ]; then
                    echo "wait-for-production-deploy result: ${{ needs.wait-for-production-deploy.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.validate-manual-production-mode.outputs.should_run_matrix }}" = "true" ] && [ "${{ needs.production-e2e-matrix.result }}" != "success" ]; then
                    echo "production-e2e-matrix result: ${{ needs.production-e2e-matrix.result }}"
                    exit 1
                  fi
