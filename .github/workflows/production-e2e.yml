name: production e2e

on:
    push:
        branches: [master, main]
    workflow_dispatch:
        # Intentional: we use manual production runs from test-fix branches to
        # validate the live-production suite itself.

permissions:
    contents: read

concurrency:
    group: production-e2e-${{ github.ref }}
    cancel-in-progress: true

jobs:
    wait-for-production-deploy:
        name: wait for production deploy
        if: github.event_name != 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 40

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'

            - name: wait for stable production readiness
              run: >-
                  node --experimental-strip-types tests/e2e/scripts/wait-for-production-deploy.mts
                  --commit ${{ github.sha }}
                  --web https://sealed.vote
                  --api https://api.sealed.vote
                  --timeout-ms 1800000
                  --interval-ms 15000
                  --request-timeout-ms 10000
                  --required-stable-checks 2

    wait-for-production-browser-readiness:
        name: wait for production browser readiness (${{ matrix.project.name }})
        needs: wait-for-production-deploy
        if: >-
            ${{
                always() &&
                (
                    github.event_name == 'workflow_dispatch' ||
                    needs.wait-for-production-deploy.result == 'success'
                )
            }}
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
            options: --ipc=host
        timeout-minutes: 30
        strategy:
            fail-fast: false
            max-parallel: 2
            matrix:
                project:
                    - name: chromium-desktop
                      ci_workers: '1'
                    - name: firefox-desktop
                      ci_workers: '1'
                    - name: webkit-desktop
                      ci_workers: '1'
                    - name: mobile-firefox-android
                      ci_workers: '1'

        env:
            HOME: /root
            PLAYWRIGHT_BASE_URL: https://sealed.vote
            PLAYWRIGHT_CI_WORKERS: ${{ matrix.project.ci_workers }}
            PLAYWRIGHT_NAVIGATION_RETRY_TIMEOUTS: 'true'
            PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: '45000'

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: wait for browser production readiness
              run: >-
                  node --experimental-strip-types tests/e2e/scripts/wait-for-production-browser-readiness.mts
                  --timeout-ms 1200000
                  --interval-ms 15000
                  --required-stable-checks 2
                  --
                  --project ${{ matrix.project.name }}

    production-e2e-matrix:
        name: production e2e (${{ matrix.project.name }})
        needs:
            [wait-for-production-deploy, wait-for-production-browser-readiness]
        if: >-
            ${{
                always() &&
                needs.wait-for-production-browser-readiness.result == 'success' &&
                (
                    github.event_name == 'workflow_dispatch' ||
                    needs.wait-for-production-deploy.result == 'success'
                )
            }}
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
            options: --ipc=host
        timeout-minutes: 30
        strategy:
            fail-fast: false
            # Keep one Playwright worker per browser job for determinism, but
            # cap the live browser matrix at two concurrent jobs to reduce
            # burst pressure against the public frontend and API origins.
            max-parallel: 2
            matrix:
                project:
                    - name: chromium-desktop
                      slug: chromium-desktop
                      ci_workers: '1'
                    - name: firefox-desktop
                      slug: firefox-desktop
                      ci_workers: '1'
                    - name: webkit-desktop
                      slug: webkit-desktop
                      ci_workers: '1'
                    - name: mobile-firefox-android
                      slug: mobile-firefox-android
                      ci_workers: '1'

        env:
            HOME: /root
            PLAYWRIGHT_BASE_URL: https://sealed.vote
            PLAYWRIGHT_BLOB_REPORT: 'true'
            PLAYWRIGHT_CI_WORKERS: ${{ matrix.project.ci_workers }}
            PLAYWRIGHT_PRODUCTION_ISOLATE_BY_FILE: 'true'
            PLAYWRIGHT_NAVIGATION_RETRY_TIMEOUTS: 'true'
            PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: '45000'

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: run production browser e2e
              # Intentional: production coverage stays full-suite against the
              # live site instead of falling back to smoke-only checks.
              run: pnpm e2e:production:test -- --project ${{ matrix.project.name }}

            - name: capture same-container endpoint diagnostics
              if: failure()
              shell: bash
              run: |
                  set -uo pipefail
                  mkdir -p production-diagnostics

                  capture_response() {
                    local slug="$1"
                    local url="$2"

                    curl -sS --location \
                      -D "production-diagnostics/${slug}.headers.txt" \
                      -o "production-diagnostics/${slug}.body.txt" \
                      "$url" || true
                  }

                  capture_response "homepage" "https://sealed.vote/"
                  capture_response "version" "https://sealed.vote/version.json"
                  capture_response "api-health" "https://api.sealed.vote/api/health-check"

                  curl -sS --location \
                    -X OPTIONS \
                    -H 'Origin: https://sealed.vote' \
                    -H 'Access-Control-Request-Method: POST' \
                    -H 'Access-Control-Request-Headers: content-type' \
                    -D production-diagnostics/api-preflight.headers.txt \
                    -o production-diagnostics/api-preflight.body.txt \
                    https://api.sealed.vote/api/polls/create || true

                  {
                    echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    echo "github_run_id=${GITHUB_RUN_ID:-}"
                    echo "github_run_attempt=${GITHUB_RUN_ATTEMPT:-}"
                    echo "github_job=${GITHUB_JOB:-}"
                    echo "matrix_project=${{ matrix.project.name }}"
                    echo "runner_os=${RUNNER_OS:-}"
                    echo "runner_arch=${RUNNER_ARCH:-}"
                    printenv | sort | grep '^PLAYWRIGHT_' || true
                  } > production-diagnostics/env.txt

                  {
                    if command -v getent >/dev/null 2>&1; then
                      echo "sealed.vote"
                      getent ahostsv4 sealed.vote || true
                      echo
                      echo "api.sealed.vote"
                      getent ahostsv4 api.sealed.vote || true
                    else
                      echo "getent is unavailable in this container."
                    fi
                  } > production-diagnostics/dns.ipv4.txt

            - name: upload production diagnostics
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: production-endpoint-diagnostics-${{ matrix.project.slug }}
                  path: production-diagnostics
                  if-no-files-found: ignore

            - name: upload Playwright blob report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: production-playwright-blob-report-${{ matrix.project.slug }}
                  path: blob-report
                  if-no-files-found: ignore

            - name: upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: production-playwright-test-results-${{ matrix.project.slug }}
                  path: test-results
                  if-no-files-found: ignore

    production-e2e-report:
        name: production e2e report
        if: always()
        needs: production-e2e-matrix
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: skip merged report on green matrix
              if: needs.production-e2e-matrix.result == 'success'
              run: echo "Skipping merged Playwright report because all production matrix jobs passed."

            - uses: actions/checkout@v6
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: install dependencies
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              run: pnpm install --frozen-lockfile

            - name: download Playwright blob reports
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              uses: actions/download-artifact@v8
              with:
                  pattern: production-playwright-blob-report-*
                  merge-multiple: true
                  path: production-blob-reports

            - name: merge Playwright report
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              run: pnpm exec playwright merge-reports --reporter html ./production-blob-reports

            - name: upload merged Playwright report
              if: needs.production-e2e-matrix.result == 'failure' || needs.production-e2e-matrix.result == 'cancelled'
              uses: actions/upload-artifact@v7
              with:
                  name: production-playwright-report
                  path: playwright-report
                  if-no-files-found: ignore

    production-e2e:
        name: production e2e
        if: always()
        needs:
            [
                wait-for-production-deploy,
                wait-for-production-browser-readiness,
                production-e2e-matrix,
                production-e2e-report,
            ]
        runs-on: ubuntu-latest

        steps:
            - name: assert production e2e jobs passed
              run: |
                  if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ needs.wait-for-production-deploy.result }}" != "success" ]; then
                    echo "wait-for-production-deploy result: ${{ needs.wait-for-production-deploy.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.wait-for-production-browser-readiness.result }}" != "success" ]; then
                    echo "wait-for-production-browser-readiness result: ${{ needs.wait-for-production-browser-readiness.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.production-e2e-matrix.result }}" != "success" ]; then
                    echo "production-e2e-matrix result: ${{ needs.production-e2e-matrix.result }}"
                    exit 1
                  fi

                  if [ "${{ needs.production-e2e-report.result }}" != "success" ]; then
                    echo "production-e2e-report result: ${{ needs.production-e2e-report.result }}"
                    exit 1
                  fi
