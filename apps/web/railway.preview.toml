[build]
builder = "RAILPACK"
watchPatterns = [
    "/apps/web/**",
    "/packages/contracts/**",
    "/packages/protocol/**",
    "/package.json",
    "/pnpm-lock.yaml",
    "/pnpm-workspace.yaml",
    "/turbo.json",
    "/.nvmrc",
    "/.npmrc",
    "/apps/web/railway.preview.toml",
]
buildCommand = "pnpm turbo run build --filter=@sealed-vote/contracts --filter=@sealed-vote/protocol --filter=@sealed-vote/web"

[deploy]
startCommand = "pnpm --filter @sealed-vote/web serve:dist"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
